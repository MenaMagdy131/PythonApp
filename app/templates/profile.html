{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<h2>My Profile</h2>
<ul class="list-group">
  <li class="list-group-item"><strong>Name:</strong> {{ user.name }}</li>
  <li class="list-group-item"><strong>Email:</strong> {{ user.email }}</li>
  <li class="list-group-item"><a href="{{ url_for('main.change_password') }}" class="btn btn-warning mt-2">Change Password</a></li>
</ul>
{% endblock %}
