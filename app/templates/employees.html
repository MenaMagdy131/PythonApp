{% extends "base.html" %}
{% block title %}Employees{% endblock %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
  <h2>Employees</h2>
  <a href="{{ url_for('main.add_employee') }}" class="btn btn-primary">Add Employee</a>
</div>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Name</th>
      <th>Position</th>
      <th>Email</th>
      <th>Created At</th>
    </tr>
  </thead>
  <tbody>
    {% for emp in employees %}
    <tr>
      <td>{{ emp.name }}</td>
      <td>{{ emp.position }}</td>
      <td>{{ emp.email }}</td>
      <td>{{ emp.created_at }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
