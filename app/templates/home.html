{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
<div class="text-center">
  <h1>Welcome to Flask App</h1>
  {% if not current_user.is_authenticated %}
    <a href="{{ url_for('main.register') }}" class="btn btn-primary m-2">Register</a>
    <a href="{{ url_for('main.login') }}" class="btn btn-success m-2">Login</a>
  {% endif %}
</div>
{% endblock %}
