- name: "Build docker image with ansible-playbook"
  hosts: localhost
  connection: local
  tasks:
    - name: stop container flaskapp_container
      command: docker container stop flaskapp_container
      ignore_errors: yes

    - name: remove container flaskapp_container
      command: docker container rm flaskapp_container
      ignore_errors: yes

    - name: remove image menamagdy/flaskapp:v1.0.0
      command: docker image rmi menamagdy/flaskapp:v1.0.0
      ignore_errors: yes

    - name: build new image menamagdy/flaskapp:v1.0.0
      command: docker build -t menamagdy/flaskapp:v1.0.0 .

    - name: run container flaskapp_container
      command: docker run -d --name flaskapp_container -p 5000:80 menamagdy/flaskapp:v1.0.0